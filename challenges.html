<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeForge - Challenges</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/challenges.css">
</head>
<body>

  <div class="dashboard-layout">

    <!-- Sidebar (same as dashboard) -->
    <aside class="sidebar">
      <div class="logo">CodeForge</div>

      <nav class="sidebar-nav">
        <a href="progress.html"><span class="icon">📈</span> View Progress</a>
        <a href="badges.html"><span class="icon">🏅</span> View Badges</a>
        <a href="challenges.html" class="active"><span class="icon">🧩</span> Challenge List</a>
        <a href="leaderboard.html"><span class="icon">🏆</span> Leaderboard</a>
      </nav>

      <button id="logout-btn" class="logout-btn">
        <span class="icon">🚪</span> Logout
      </button>
    </aside>

    <!-- Main content -->
    <main class="dashboard-main">
      <h1>Challenges</h1>
      <p class="dashboard-subtext">Pick something to solve.</p>

      <!-- Filters -->
      <div class="filters">
        <div class="difficulty-pills" id="difficulty-pills">
          <button class="pill active" data-difficulty="All">All</button>
          <button class="pill" data-difficulty="Easy">Easy</button>
          <button class="pill" data-difficulty="Medium">Medium</button>
          <button class="pill" data-difficulty="Hard">Hard</button>
        </div>

        <select id="topic-filter" class="topic-dropdown">
          <option value="All">All Topics</option>
        </select>
      </div>

      <!-- Challenge cards -->
      <div class="challenge-grid" id="challenge-grid">
        <p id="empty-msg" class="empty-msg" style="display: none;">No challenges match these filters.</p>
      </div>
    </main>

  </div>

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/challenges.js"></script>
</body>
</html>
