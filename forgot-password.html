
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeForge - Forgot Password</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Nav bar -->
  <nav class="navbar">
    <div class="logo">CodeForge</div>
    <div class="nav-links">
      <a href="login.html">Login</a>
    </div>
  </nav>

  <!-- Auth card -->
  <section class="auth-wrapper">
    <div class="auth-card">
      <h1>Reset your password</h1>
      <p class="auth-subtext">Enter your email and we'll send you a reset code.</p>

      <p id="error-msg" class="error-text"></p>

      <!-- Step 1: request code -->
      <form id="forgot-email-form">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" name="forgot-email" placeholder="you@example.com" required>

        <button type="submit" class="btn-primary btn-full">Send Reset Code</button>
      </form>

      <!-- Step 2: enter code + new password (hidden until step 1 succeeds) -->
      <div id="reset-section" style="display: none;">
        <p id="demo-code" class="demo-code"></p>

        <form id="reset-form">
          <label for="reset-code">Reset code</label>
          <input type="text" id="reset-code" name="reset-code" placeholder="Enter 6-digit code" maxlength="6" required>

          <label for="new-password">New password</label>
          <div class="password-wrapper">
            <input type="password" id="new-password" name="new-password" placeholder="Enter a new password" required>
            <span class="toggle-password" data-target="new-password">👁️</span>
          </div>

          <button type="submit" class="btn-primary btn-full">Reset Password</button>
        </form>
      </div>

      <p class="auth-footer-text">Remembered your password? <a href="login.html">Log in</a></p>
    </div>
  </section>

  <script src="js/auth.js"></script>
</body>
</html>
