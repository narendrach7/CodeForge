<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeForge - Leaderboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body>

  <div class="dashboard-layout">

    <!-- Sidebar (same as dashboard) -->
    <aside class="sidebar">
      <div class="logo">CodeForge</div>

      <nav class="sidebar-nav">
        <a href="progress.html"><span class="icon">📈</span> View Progress</a>
        <a href="badges.html"><span class="icon">🏅</span> View Badges</a>
        <a href="challenges.html"><span class="icon">🧩</span> Challenge List</a>
        <a href="leaderboard.html" class="active"><span class="icon">🏆</span> Leaderboard</a>
      </nav>

      <button id="logout-btn" class="logout-btn">
        <span class="icon">🚪</span> Logout
      </button>
    </aside>

    <!-- Main content -->
    <main class="dashboard-main">
      <h1>Leaderboard</h1>
      <p class="dashboard-subtext">See how you stack up against everyone else.</p>

      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Points</th>
            <th>Badges</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </main>

  </div>

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
