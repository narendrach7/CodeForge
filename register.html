
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeForge - Sign Up</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Nav bar -->
  <nav class="navbar">
    <div class="logo">CodeForge</div>
    <div class="nav-links">
      <a href="login.html">Login</a>
    </div>
  </nav>

  <!-- Auth card -->
  <section class="auth-wrapper">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="auth-subtext">Start solving challenges on CodeForge.</p>

      <p id="error-msg" class="error-text"></p>

      <form id="register-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter a username" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Create a password" required>
          <span class="toggle-password" data-target="password">👁️</span>
        </div>

        <button type="submit" class="btn-primary btn-full">Sign Up</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <button id="google-signup" class="btn-google btn-full">Continue with Google</button>

      <p class="auth-footer-text">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </section>

  <script src="js/auth.js"></script>
</body>

</html>
